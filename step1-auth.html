<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Magic – Login & Signup</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<meta name="theme-color" content="#23CED9">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
body{display:flex;flex-direction:column;min-height:100vh;background:var(--bg);}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:100px 24px 48px;}
.auth-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:40px;width:100%;max-width:420px;animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes popIn{0%{transform:scale(0.88);opacity:0}80%{transform:scale(1.02)}100%{transform:scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(110px) rotate(720deg);opacity:0}}
.tabs{display:flex;background:#f0f0f8;border-radius:50px;padding:4px;gap:4px;margin-bottom:24px;}
.tab{flex:1;padding:9px;border-radius:50px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;color:#8888aa;border:none;background:transparent;text-align:center;}
.tab.active{background:var(--blue);color:#fff;box-shadow:0 4px 12px rgba(35,206,217,0.35);}
.alert{border-radius:var(--radius-sm);padding:11px 14px;margin-bottom:16px;font-size:13px;font-weight:700;}
.alert-error{background:rgba(239,68,68,0.08);border:1.5px solid rgba(239,68,68,0.2);color:#dc2626;}
.spinner-inline{width:18px;height:18px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
.confetti-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:999;}
.confetti-piece{position:absolute;border-radius:2px;animation:confetti 2s ease forwards;}
@media(max-width:480px){.auth-card{padding:28px 18px;}}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-logo" onclick="window.location='landing.html'" style="cursor:pointer;">✨ <span>QR</span> Magic</div>
  <div class="nav-links">
    <a class="nav-link" onclick="window.location='landing.html'">← Back to Home</a>
  </div>
</nav>

<!-- Confetti layer -->
<div class="confetti-wrap" id="confetti-wrap" style="display:none;"></div>

<div class="auth-wrap">
  <div class="auth-card">

    <!-- Mascot -->
    <div style="text-align:center;margin-bottom:16px;">
      <img src="mascot.png"
           alt="QR Magic mascot"
           style="width:100px;height:100px;object-fit:contain;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 6px 18px rgba(35,206,217,0.22));"
           onerror="this.style.display='none'">
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Log In</button>
      <button class="tab" id="tab-signup" onclick="switchTab('signup')">Sign Up Free</button>
    </div>

    <!-- Alert -->
    <div id="auth-alert" class="alert alert-error" style="display:none;"></div>

    <!-- ── LOGIN ── -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="login-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()">
      </div>
      <button class="btn-primary" id="login-btn" onclick="handleLogin()" style="width:100%;justify-content:center;font-size:15px;padding:13px;margin-top:4px;">
        <i data-lucide="log-in" style="width:16px;height:16px;"></i>
        Log In
      </button>
      <div style="text-align:center;margin-top:16px;font-size:13px;font-weight:600;color:#8888aa;">
        Don't have an account? <span style="color:var(--blue);cursor:pointer;font-weight:800;" onclick="switchTab('signup')">Sign up free →</span>
      </div>
    </div>

    <!-- ── SIGNUP ── -->
    <div id="form-signup" style="display:none;">
      <div class="form-group">
        <label class="form-label">Your Name</label>
        <input class="form-input" type="text" id="signup-name" placeholder="Alex Smith">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="signup-pass" placeholder="Min 6 characters" onkeydown="if(event.key==='Enter')handleSignup()">
      </div>
      <label class="checkbox-row" style="margin-bottom:14px;">
        <input type="checkbox" id="signup-marketing" checked>
        <span>I agree to receive product updates, tips, and offers from QR Magic. Unsubscribe anytime.</span>
      </label>
      <p style="font-size:11px;color:#aaa;font-weight:600;line-height:1.5;margin-bottom:16px;">
        By signing up you agree to our <a href="legal.html?type=terms" style="color:var(--blue);">Terms</a> and <a href="legal.html?type=privacy" style="color:var(--blue);">Privacy Policy</a>.
      </p>
      <button class="btn-primary" id="signup-btn" onclick="handleSignup()" style="width:100%;justify-content:center;font-size:15px;padding:13px;">
        <i data-lucide="user-plus" style="width:16px;height:16px;"></i>
        Create Free Account
      </button>
      <div style="text-align:center;margin-top:16px;font-size:13px;font-weight:600;color:#8888aa;">
        Already have an account? <span style="color:var(--blue);cursor:pointer;font-weight:800;" onclick="switchTab('login')">Log in →</span>
      </div>
    </div>

  </div>
</div>

<script>
const SUPA_URL = 'https://igbbfjushjmiafohvgdt.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlnYmJmanVzaGptaWFmb2h2Z2R0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTgxNDQsImV4cCI6MjA5MjYzNDE0NH0.xIvQiHWm4IVlkGSwgRK0Owyhhna5qz8HCGCtPL2JexI';
const sb = supabase.createClient(SUPA_URL, SUPA_KEY);
const SESSION_KEY = 'qrmagic_session';

function getSession(){try{return JSON.parse(sessionStorage.getItem(SESSION_KEY)||'null');}catch{return null;}}
function saveSession(u){sessionStorage.setItem(SESSION_KEY, JSON.stringify(u));}

function showAlert(msg) {
  const el = document.getElementById('auth-alert');
  el.textContent = msg;
  el.style.display = 'block';
}
function clearAlert() { document.getElementById('auth-alert').style.display = 'none'; }

function setLoading(btnId, loading, defaultHTML) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.style.opacity = loading ? '0.7' : '1';
  btn.innerHTML = loading
    ? '<div class="spinner-inline"></div> Please wait...'
    : defaultHTML;
}

function switchTab(tab) {
  clearAlert();
  const isLogin = tab === 'login';
  document.getElementById('tab-login').className = 'tab' + (isLogin ? ' active' : '');
  document.getElementById('tab-signup').className = 'tab' + (!isLogin ? ' active' : '');
  document.getElementById('form-login').style.display = isLogin ? 'block' : 'none';
  document.getElementById('form-signup').style.display = !isLogin ? 'block' : 'none';
  lucide.createIcons();
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.style.display = 'block';
  wrap.innerHTML = '';
  const colors = ['#23CED9','#FF69B4','#FFD700','#7C3AED','#22c55e','#f97316'];
  for(let i = 0; i < 24; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const size = 8 + Math.random() * 8;
    el.style.cssText = `left:${Math.random()*100}%;top:-10px;width:${size}px;height:${size}px;background:${colors[i%colors.length]};border-radius:${Math.random()>0.5?'50%':'3px'};animation-delay:${Math.random()*1}s;animation-duration:${1.4+Math.random()*0.8}s;`;
    wrap.appendChild(el);
  }
  setTimeout(() => { wrap.style.display = 'none'; wrap.innerHTML = ''; }, 2800);
}

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  clearAlert();
  if(!email || !pass) { showAlert('Please fill in your email and password.'); return; }
  setLoading('login-btn', true, '<i data-lucide="log-in" style="width:16px;height:16px;"></i> Log In');
  try {
    const { data, error } = await sb.from('users').select('*').eq('email', email).maybeSingle();
    if(error) throw error;
    if(!data) { showAlert('No account found with this email. Please sign up.'); setLoading('login-btn', false, '<i data-lucide="log-in" style="width:16px;height:16px;"></i> Log In'); lucide.createIcons(); return; }
    if(data.password !== pass) { showAlert('Incorrect password. Please try again.'); setLoading('login-btn', false, '<i data-lucide="log-in" style="width:16px;height:16px;"></i> Log In'); lucide.createIcons(); return; }
    if(data.deleted) { showAlert('This account has been deleted. Email office@honoshi.co.il to reactivate.'); setLoading('login-btn', false, '<i data-lucide="log-in" style="width:16px;height:16px;"></i> Log In'); lucide.createIcons(); return; }
    saveSession({ id: data.id, email: data.email, name: data.name, plan: data.plan });
    window.location.replace('dashboard.html');
  } catch(err) {
    showAlert('Connection error. Please try again.');
    setLoading('login-btn', false, '<i data-lucide="log-in" style="width:16px;height:16px;"></i> Log In');
    lucide.createIcons();
  }
}

async function handleSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const marketing = document.getElementById('signup-marketing').checked;
  clearAlert();
  if(!name) { showAlert('Please enter your name.'); return; }
  if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showAlert('Please enter a valid email address.'); return; }
  if(!pass || pass.length < 6) { showAlert('Password must be at least 6 characters.'); return; }
  setLoading('signup-btn', true, '<i data-lucide="user-plus" style="width:16px;height:16px;"></i> Create Free Account');
  try {
    const { data: existing } = await sb.from('users').select('id').eq('email', email).maybeSingle();
    if(existing) { showAlert('An account with this email already exists. Please log in.'); setLoading('signup-btn', false, '<i data-lucide="user-plus" style="width:16px;height:16px;"></i> Create Free Account'); lucide.createIcons(); return; }
    const { data, error } = await sb.from('users').insert({ email, name, password: pass, marketing, plan: 'free', deleted: false }).select().single();
    if(error) throw error;
    saveSession({ id: data.id, email: data.email, name: data.name, plan: data.plan });
    launchConfetti();
    // Go straight to dashboard — no summary screen
    setTimeout(() => window.location.replace('dashboard.html'), 800);
  } catch(err) {
    showAlert('Could not create account: ' + (err.message || 'Please try again.'));
    setLoading('signup-btn', false, '<i data-lucide="user-plus" style="width:16px;height:16px;"></i> Create Free Account');
    lucide.createIcons();
  }
}

// Auto-redirect if already logged in
window.addEventListener('load', () => {
  lucide.createIcons();
  const session = getSession();
  if(session && session.id) window.location.replace('dashboard.html');
});
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
</body>
</html>
