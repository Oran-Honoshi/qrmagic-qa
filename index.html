<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRMagic – QR Code Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #23CED9;
    --pink: #FF69B4;
    --bg: #F9F9F9;
    --mint: #E0F7FA;
    --indigo: #1A1A2E;
    --blue-dark: #1ab5bf;
    --pink-dark: #e55ba0;
    --shadow: 0 8px 32px rgba(26,26,46,0.10);
    --shadow-lg: 0 16px 48px rgba(26,26,46,0.15);
    --radius: 20px;
    --radius-sm: 12px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--indigo); overflow-x: hidden; }
  #root { min-height: 100vh; }

  /* Animations */
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes bounce { 0%,100%{transform:scale(1)} 40%{transform:scale(1.12)} 60%{transform:scale(0.96)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes slideInRight { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
  @keyframes confetti { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(120px) rotate(720deg);opacity:0} }
  @keyframes popIn { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }

  .animate-float { animation: float 3s ease-in-out infinite; }
  .animate-pulse-btn { animation: pulse 2s ease-in-out infinite; }
  .animate-fadeinup { animation: fadeInUp 0.6s ease both; }
  .animate-popin { animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--mint); }
  ::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 8px; }

  /* Buttons */
  .btn-primary {
    background: var(--blue); color: #fff; border: none; border-radius: 50px;
    padding: 14px 32px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
    cursor: pointer; box-shadow: 0 6px 20px rgba(35,206,217,0.4);
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-primary:hover { background: var(--blue-dark); transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 28px rgba(35,206,217,0.5); }
  .btn-primary:active { transform: scale(0.97); }
  .btn-pink {
    background: var(--pink); color: #fff; border: none; border-radius: 50px;
    padding: 14px 32px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
    cursor: pointer; box-shadow: 0 6px 20px rgba(255,105,180,0.4);
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-pink:hover { background: var(--pink-dark); transform: translateY(-2px) scale(1.04); }
  .btn-outline {
    background: transparent; color: var(--indigo); border: 2.5px solid var(--indigo); border-radius: 50px;
    padding: 12px 28px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-outline:hover { background: var(--indigo); color: #fff; transform: translateY(-2px); }

  /* Cards */
  .card {
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
    border: 2px solid transparent; transition: all 0.25s;
  }
  .card:hover { border-color: var(--blue); box-shadow: var(--shadow-lg); transform: translateY(-3px); }
  .card-mint { background: var(--mint); border-radius: var(--radius); box-shadow: var(--shadow); }

  /* Nav */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(249,249,249,0.92); backdrop-filter: blur(12px);
    border-bottom: 2px solid rgba(35,206,217,0.15);
    padding: 14px 40px; display: flex; align-items: center; justify-content: space-between;
  }
  .nav-logo { font-size: 26px; font-weight: 900; color: var(--indigo); display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .nav-logo span { color: var(--blue); }
  .nav-links { display: flex; gap: 28px; align-items: center; }
  .nav-link { font-weight: 700; color: var(--indigo); cursor: pointer; transition: color 0.2s; font-size: 15px; }
  .nav-link:hover { color: var(--blue); }

  /* Hero */
  .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;
    padding: 120px 24px 80px; position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 60% 0%, rgba(35,206,217,0.13) 0%, transparent 60%),
                radial-gradient(ellipse at 10% 80%, rgba(255,105,180,0.10) 0%, transparent 55%), var(--bg);
  }
  .hero h1 { font-size: clamp(36px, 7vw, 72px); font-weight: 900; line-height: 1.1; color: var(--indigo); margin-bottom: 20px; }
  .hero h1 .highlight { color: var(--blue); }
  .hero h1 .highlight2 { color: var(--pink); }
  .hero-sub { font-size: clamp(16px, 2.5vw, 21px); color: #5a5a7a; max-width: 580px; margin: 0 auto 36px; font-weight: 600; line-height: 1.6; }
  .hero-blob1 { position: absolute; top: -60px; right: -80px; width: 350px; height: 350px; border-radius: 50%; background: rgba(35,206,217,0.12); filter: blur(40px); pointer-events: none; }
  .hero-blob2 { position: absolute; bottom: -40px; left: -60px; width: 280px; height: 280px; border-radius: 50%; background: rgba(255,105,180,0.10); filter: blur(40px); pointer-events: none; }

  /* Steps */
  .steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  @media (max-width: 700px) { .steps { grid-template-columns: 1fr; } }
  .step-card { padding: 32px 24px; text-align: center; position: relative; }
  .step-icon { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 16px; }
  .step-num { position: absolute; top: 20px; left: 20px; width: 28px; height: 28px; background: var(--indigo); color: #fff; border-radius: 50%; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
  .step-card h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
  .step-card p { font-size: 14px; color: #6b6b8a; font-weight: 600; }

  /* Video placeholder */
  .video-box { background: linear-gradient(135deg, var(--indigo) 0%, #2d2d5a 100%); border-radius: var(--radius); aspect-ratio: 16/9; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--shadow-lg); }
  .play-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 0 16px rgba(35,206,217,0.2); animation: pulse 2s ease-in-out infinite; cursor: pointer; transition: transform 0.2s; }
  .play-btn:hover { transform: scale(1.1); }

  /* Pricing */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1000px; margin: 0 auto; }
  @media (max-width: 800px) { .pricing-grid { grid-template-columns: 1fr; max-width: 400px; } }
  .plan-card { padding: 36px 28px; text-align: center; position: relative; }
  .plan-card.featured { border-color: var(--blue); background: linear-gradient(160deg, #fff 0%, rgba(35,206,217,0.07) 100%); }
  .plan-badge { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #fff; border-radius: 50px; padding: 5px 18px; font-size: 13px; font-weight: 800; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .plan-price { font-size: 48px; font-weight: 900; color: var(--indigo); line-height: 1; }
  .plan-price sup { font-size: 22px; vertical-align: super; }
  .plan-price .period { font-size: 15px; color: #8888aa; font-weight: 600; }
  .plan-feature { padding: 8px 0; font-size: 14px; font-weight: 600; color: #4a4a6a; display: flex; align-items: center; gap: 8px; text-align: left; }
  .plan-divider { border: none; border-top: 1.5px solid rgba(35,206,217,0.2); margin: 20px 0; }
  .check { color: var(--blue); font-size: 16px; flex-shrink: 0; }

  /* Toggle */
  .toggle-bar { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 40px; }
  .toggle-switch { width: 56px; height: 30px; background: var(--blue); border-radius: 30px; position: relative; cursor: pointer; transition: background 0.3s; }
  .toggle-knob { position: absolute; top: 4px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: left 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
  .badge-save { background: var(--pink); color: #fff; border-radius: 50px; padding: 2px 10px; font-size: 12px; font-weight: 800; }

  /* Section */
  .section { padding: 80px 24px; }
  .section-title { font-size: clamp(28px, 5vw, 44px); font-weight: 900; text-align: center; color: var(--indigo); margin-bottom: 12px; }
  .section-sub { text-align: center; color: #7a7a9a; font-size: 17px; font-weight: 600; margin-bottom: 52px; }

  /* Dashboard */
  .dash-layout { display: flex; min-height: 100vh; background: var(--bg); }
  .sidebar { width: 240px; background: var(--indigo); min-height: 100vh; padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
  .sidebar-logo { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 36px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
  .sidebar-logo span { color: var(--blue); }
  .sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer; color: rgba(255,255,255,0.65); font-weight: 700; font-size: 15px; transition: all 0.2s; }
  .sidebar-item:hover { background: rgba(35,206,217,0.12); color: #fff; }
  .sidebar-item.active { background: var(--blue); color: #fff; box-shadow: 0 4px 16px rgba(35,206,217,0.4); }
  .sidebar-item svg { flex-shrink: 0; }
  .dash-main { margin-left: 240px; flex: 1; padding: 32px; }
  @media (max-width: 900px) { .sidebar { width: 64px; } .sidebar-logo, .sidebar-item span { display: none; } .dash-main { margin-left: 64px; } .sidebar-item { justify-content: center; } }

  /* QR Step Wizard */
  .wizard-steps { display: flex; gap: 0; margin-bottom: 36px; }
  .wstep { display: flex; align-items: center; gap: 0; flex: 1; }
  .wstep-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; border: 2.5px solid; transition: all 0.3s; }
  .wstep-circle.done { background: var(--blue); border-color: var(--blue); color: #fff; }
  .wstep-circle.active { background: #fff; border-color: var(--blue); color: var(--blue); }
  .wstep-circle.inactive { background: #fff; border-color: #ddd; color: #bbb; }
  .wstep-label { font-size: 13px; font-weight: 700; margin-left: 10px; }
  .wstep-label.active { color: var(--blue); }
  .wstep-label.inactive { color: #bbb; }
  .wstep-line { flex: 1; height: 2.5px; margin: 0 8px; border-radius: 2px; transition: background 0.3s; }

  /* QR Type Grid */
  .type-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
  .type-card { background: #fff; border: 2.5px solid transparent; border-radius: var(--radius-sm); padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(26,26,46,0.07); }
  .type-card:hover { border-color: var(--blue); transform: translateY(-3px); }
  .type-card.selected { border-color: var(--blue); background: linear-gradient(135deg, rgba(35,206,217,0.08), rgba(35,206,217,0.02)); }
  .type-icon { font-size: 34px; margin-bottom: 8px; }
  .type-label { font-size: 13px; font-weight: 800; color: var(--indigo); }

  /* Form */
  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 14px; font-weight: 800; color: var(--indigo); margin-bottom: 8px; }
  .form-input { width: 100%; padding: 12px 16px; border: 2.5px solid #e8e8f0; border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: var(--indigo); background: #fff; transition: border-color 0.2s; outline: none; }
  .form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(35,206,217,0.12); }

  /* Color Picker */
  .color-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
  .color-dot.selected { border-color: var(--indigo); transform: scale(1.2); }
  .color-dot:hover { transform: scale(1.15); }

  /* QR Preview */
  .qr-preview-box { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 32px; text-align: center; position: sticky; top: 20px; }
  .qr-canvas-wrap { display: inline-block; border-radius: 12px; overflow: hidden; }

  /* Toggle Dynamic/Static */
  .ds-toggle { display: flex; background: #f0f0f8; border-radius: 50px; padding: 4px; gap: 4px; width: fit-content; }
  .ds-option { padding: 8px 20px; border-radius: 50px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; color: #8888aa; }
  .ds-option.active { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(35,206,217,0.35); }

  /* Analytics */
  .stat-card { padding: 24px; text-align: center; }
  .stat-num { font-size: 40px; font-weight: 900; color: var(--blue); line-height: 1; }
  .stat-label { font-size: 14px; font-weight: 700; color: #7a7a9a; margin-top: 6px; }
  .stat-change { font-size: 13px; font-weight: 700; margin-top: 4px; }
  .up { color: #22c55e; }
  .down { color: #ef4444; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.55); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn 0.2s ease; }
  .modal-box { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 40px; max-width: 440px; width: 100%; position: relative; animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both; }
  .modal-close { position: absolute; top: 16px; right: 16px; background: #f0f0f8; border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #8888aa; transition: all 0.2s; }
  .modal-close:hover { background: var(--mint); color: var(--blue); }

  /* Confetti */
  .confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confetti 2s ease forwards; }

  /* Frame previews */
  .frame-opt { border: 2.5px solid transparent; border-radius: 10px; padding: 6px; cursor: pointer; font-size: 11px; font-weight: 700; text-align: center; transition: all 0.2s; color: #6a6a8a; }
  .frame-opt:hover, .frame-opt.sel { border-color: var(--blue); color: var(--blue); background: rgba(35,206,217,0.07); }

  /* My Codes table */
  .codes-table { width: 100%; border-collapse: collapse; }
  .codes-table th { text-align: left; padding: 12px 16px; font-size: 13px; font-weight: 800; color: #8888aa; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #f0f0f8; }
  .codes-table td { padding: 16px; font-size: 14px; font-weight: 600; border-bottom: 1.5px solid #f0f0f8; vertical-align: middle; }
  .codes-table tr:last-child td { border-bottom: none; }
  .codes-table tr:hover td { background: rgba(35,206,217,0.04); }
  .code-thumb { width: 44px; height: 44px; border-radius: 8px; background: #f5f5fb; display: flex; align-items: center; justify-content: center; font-size: 20px; }
  .status-badge { border-radius: 50px; padding: 4px 12px; font-size: 12px; font-weight: 800; }
  .badge-dynamic { background: rgba(35,206,217,0.15); color: var(--blue); }
  .badge-static { background: rgba(255,105,180,0.15); color: var(--pink); }

  /* Responsive */
  @media (max-width: 600px) { .nav { padding: 12px 16px; } .hero { padding: 100px 16px 60px; } .section { padding: 60px 16px; } .nav-links .btn-outline { display: none; } }

  /* Disco blobs in hero */
  .deco-blob { position: absolute; border-radius: 50%; pointer-events: none; }

  /* Scrollable main */
  .app-scroll { overflow-y: auto; }

  /* Footer */
  .footer { background: var(--indigo); color: rgba(255,255,255,0.7); text-align: center; padding: 36px 24px; font-size: 14px; font-weight: 600; }
  .footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Icons (inline SVG) ─────────────────────────────────
const Icon = ({ name, size = 20, color = 'currentColor' }) => {
  const icons = {
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,

    eye: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    close: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    zap: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
    edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
    trash: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>,
    qr: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="5" height="5"/><rect x="16" y="3" width="5" height="5"/><rect x="3" y="16" width="5" height="5"/><path d="M21 16h-3v3"/><path d="M21 21v-1"/><path d="M12 3v3"/><path d="M12 10v2"/><path d="M12 16v5"/><path d="M16 12h5"/></svg>,
  };
  return icons[name] || null;
};

// ── Simple QR code rendered as canvas via library ──────
const QRCodeRenderer = ({ value, color, bgColor, size = 180 }) => {
  const containerRef = useRef(null);
  const qrRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current) return;
    containerRef.current.innerHTML = '';
    if (!value) return;
    try {
      qrRef.current = new QRCode(containerRef.current, {
        text: value || 'https://qrmagic.io',
        width: size, height: size,
        colorDark: color || '#1A1A2E',
        colorLight: bgColor || '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.H,
      });
    } catch(e) {}
  }, [value, color, bgColor, size]);

  return <div ref={containerRef} className="qr-canvas-wrap" style={{ borderRadius: 8 }} />;
};

const DonutChart = ({ data }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  let offset = 0;
  const r = 60, cx = 80, cy = 80, stroke = 28;
  const circumference = 2 * Math.PI * r;
  const segments = data.map(d => {
    const pct = d.value / total;
    const seg = { ...d, pct, offset, dashArray: `${pct * circumference} ${circumference}` };
    offset += pct;
    return seg;
  });
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
      <svg width={160} height={160} viewBox="0 0 160 160">
        {segments.map((seg, i) => (
          <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color}
            strokeWidth={stroke} strokeDasharray={seg.dashArray}
            strokeDashoffset={-seg.offset * circumference}
            transform="rotate(-90 80 80)" style={{ transition: 'all 0.5s ease' }} />
        ))}
        <circle cx={cx} cy={cy} r={r - stroke / 2 - 2} fill="white" />
        <text x={cx} y={cy - 8} textAnchor="middle" fontSize="22" fontWeight="900" fill="#1A1A2E">{total}</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fontSize="11" fontWeight="700" fill="#8888aa">total</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 12, height: 12, borderRadius: 3, background: d.color, flexShrink: 0 }} />
            <span style={{ fontSize: 13, fontWeight: 700, color: '#4a4a6a' }}>{d.label}</span>
            <span style={{ fontSize: 13, fontWeight: 800, color: '#1A1A2E', marginLeft: 'auto', paddingLeft: 12 }}>{d.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};

    if (qrType === 'wifi') return `WIFI:T:WPA;S:${formData.ssid || ''};P:${formData.password || ''};;`;
    if (qrType === 'vcard') return `BEGIN:VCARD\nFN:${formData.name||''}\nTEL:${formData.phone||''}\nEMAIL:${formData.email||''}\nEND:VCARD`;
    if (qrType === 'text') return formData.text || 'Hello from QRMagic!';
    if (qrType === 'email') return `mailto:${formData.email||''}?subject=${formData.subject||''}`;
    if (qrType === 'phone') return `tel:${formData.phone||''}`;
    if (qrType === 'sms') return `sms:${formData.phone||''}?body=${formData.message||''}`;
    return 'https://qrmagic.io';
  };

  const renderForm = () => {
    switch(qrType) {
      case 'url': return (
        <>
          {qrType === 'url' && (
            <div style={{ marginBottom: 20 }}>
              <label className="form-label">QR Code Type</label>
              <div className="ds-toggle">
                <div className={`ds-option ${isDynamic ? 'active' : ''}`} onClick={() => setIsDynamic(true)}>⚡ Dynamic</div>
                <div className={`ds-option ${!isDynamic ? 'active' : ''}`} onClick={() => setIsDynamic(false)}>🔒 Static</div>
              </div>
              {isDynamic && <p style={{ fontSize: 12, color: '#8888aa', marginTop: 8, fontWeight: 600 }}>✓ Editable URL · ✓ Analytics · ✓ Scan tracking</p>}
            </div>
          )}
          <div className="form-group">
            <label className="form-label">Destination URL</label>
            <input className="form-input" placeholder="https://yourwebsite.com" value={formData.url||''} onChange={e => setFormData({...formData, url: e.target.value})} />
          </div>
          <div className="form-group">
            <label className="form-label">QR Code Name (optional)</label>
            <input className="form-input" placeholder="My Homepage QR" value={formData.name||''} onChange={e => setFormData({...formData, name: e.target.value})} />
          </div>
        </>
      );
      case 'wifi': return (
        <>
          <div className="form-group"><label className="form-label">Network Name (SSID)</label><input className="form-input" placeholder="MyHomeNetwork" value={formData.ssid||''} onChange={e=>setFormData({...formData,ssid:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={formData.password||''} onChange={e=>setFormData({...formData,password:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Security</label>
            <select className="form-input" value={formData.security||'WPA'} onChange={e=>setFormData({...formData,security:e.target.value})}>
              <option>WPA</option><option>WEP</option><option>None</option>
            </select>
          </div>
        </>
      );
      case 'vcard': return (
        <>
          <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Alex Smith" value={formData.name||''} onChange={e=>setFormData({...formData,name:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Phone</label><input className="form-input" placeholder="+1 (555) 000-0000" value={formData.phone||''} onChange={e=>setFormData({...formData,phone:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="alex@example.com" value={formData.email||''} onChange={e=>setFormData({...formData,email:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Company</label><input className="form-input" placeholder="Acme Inc." value={formData.company||''} onChange={e=>setFormData({...formData,company:e.target.value})} /></div>
        </>
      );
      case 'text': return (
        <div className="form-group"><label className="form-label">Your Text</label><textarea className="form-input" rows={5} placeholder="Type anything..." value={formData.text||''} onChange={e=>setFormData({...formData,text:e.target.value})} /></div>
      );
      case 'email': return (
        <>
          <div className="form-group"><label className="form-label">Email Address</label><input className="form-input" type="email" placeholder="recipient@example.com" value={formData.email||''} onChange={e=>setFormData({...formData,email:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Subject (optional)</label><input className="form-input" placeholder="Hello there!" value={formData.subject||''} onChange={e=>setFormData({...formData,subject:e.target.value})} /></div>
          <div className="form-group"><label className="form-label">Body (optional)</label><textarea className="form-input" rows={3} value={formData.body||''} onChange={e=>setFormData({...formData,body:e.target.value})} /></div>
        </>
      );
      default: return (
        <div className="form-group"><label className="form-label">Value</label><input className="form-input" placeholder="Enter value..." value={formData.text||''} onChange={e=>setFormData({...formData,text:e.target.value})} /></div>
      );
    }
  };

  const steps = ['Select Type', 'Input Data', 'Customize'];

  return (
    <div>
      <div style={{ marginBottom: 28 }}>
        <button onClick={onBack} style={{ background: 'none', border: 'none', color: '#8888aa', cursor: 'pointer', fontFamily: 'Nunito', fontWeight: 700, fontSize: 14, display: 'flex', alignItems: 'center', gap: 6, marginBottom: 16 }}>
          ← Back to Dashboard
        </button>
        <h1 style={{ fontSize: 28, fontWeight: 900, marginBottom: 4 }}>Create QR Code ✨</h1>
        <p style={{ color: '#8888aa', fontWeight: 600 }}>Follow the steps below to create your perfect QR code</p>
      </div>

      {/* Step indicators */}
      <div className="wizard-steps" style={{ marginBottom: 36 }}>
        {steps.map((s, i) => {
          const n = i + 1;
          const state = n < step ? 'done' : n === step ? 'active' : 'inactive';
          return (
            <div key={i} className="wstep">
              <div className={`wstep-circle ${state}`}>
                {state === 'done' ? <Icon name="check" size={14} color="#fff" /> : n}
              </div>
              <span className={`wstep-label ${state === 'active' ? 'active' : 'inactive'}`}>{s}</span>
              {i < steps.length - 1 && (
                <div className="wstep-line" style={{ background: n < step ? '#23CED9' : '#e8e8f0' }} />
              )}
            </div>
          );
        })}
      </div>

      {step === 1 && (
        <div>
          <h3 style={{ fontSize: 18, fontWeight: 800, marginBottom: 16 }}>What type of QR code?</h3>
          <div className="type-grid">
            {types.map(t => (
              <div key={t.id} className={`type-card ${qrType === t.id ? 'selected' : ''}`} onClick={() => setQrType(t.id)}>
                <div className="type-icon">{t.icon}</div>
                <div className="type-label">{t.label}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 28, display: 'flex', justifyContent: 'flex-end' }}>
            <button className="btn-primary" onClick={() => qrType && setStep(2)} style={{ opacity: qrType ? 1 : 0.5 }}>
              Next Step →
            </button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 28 }}>
          <div>
            <h3 style={{ fontSize: 18, fontWeight: 800, marginBottom: 20 }}>Enter your details</h3>
            {renderForm()}
            <div style={{ display: 'flex', gap: 12, marginTop: 8 }}>
              <button className="btn-outline" onClick={() => setStep(1)}>← Back</button>
              <button className="btn-primary" onClick={() => setStep(3)}>Next: Customize →</button>
            </div>
          </div>
          <div className="qr-preview-box">
            <p style={{ fontSize: 13, fontWeight: 800, color: '#8888aa', marginBottom: 16, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Live Preview</p>
            <QRCodeRenderer value={getQrValue()} color={qrColor} bgColor={bgColor} size={200} />
            <p style={{ fontSize: 12, color: '#aaaacc', marginTop: 12, fontWeight: 600 }}>Preview updates in real-time</p>
          </div>
        </div>
      )}

      {step === 3 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 320px', gap: 28 }}>
          <div>
            <h3 style={{ fontSize: 18, fontWeight: 800, marginBottom: 20 }}>Customize your QR code</h3>

            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label">QR Code Color</label>
              <div className="color-row">
                {qrColors.map(c => (
                  <div key={c} className={`color-dot ${qrColor === c ? 'selected' : ''}`} style={{ background: c }} onClick={() => setQrColor(c)} />
                ))}
              </div>
            </div>

            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label">Background Color</label>
              <div className="color-row">
                {bgColors.map(c => (
                  <div key={c} className={`color-dot ${bgColor === c ? 'selected' : ''}`} style={{ background: c, border: c === '#FFFFFF' ? '2px solid #e8e8f0' : 'none' }} onClick={() => setBgColor(c)} />
                ))}
              </div>
            </div>

            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label" style={{ marginBottom: 12 }}>Frame Style</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
                {frames.map(f => (
                  <div key={f} className={`frame-opt ${frame === f ? 'sel' : ''}`} onClick={() => setFrame(f)}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>
                      {f === 'none' ? '⊡' : f === 'simple' ? '□' : f === 'rounded' ? '▢' : f === 'badge' ? '🏷️' : '📲'}
                    </div>
                    <div>{f}</div>
                  </div>
                ))}
              </div>
            </div>

            <div className="card" style={{ padding: 20, marginBottom: 24 }}>
              <label className="form-label">Add Logo (center)</label>
              <div style={{ border: '2px dashed #e8e8f0', borderRadius: 12, padding: '20px', textAlign: 'center', cursor: 'pointer', color: '#aaaacc', fontWeight: 600, fontSize: 14 }}
                onClick={() => {}}>
                📎 Click to upload logo (PNG, SVG)
              </div>
            </div>

            <div style={{ display: 'flex', gap: 12 }}>
              <button className="btn-outline" onClick={() => setStep(2)}>← Back</button>
              <button className="btn-pink" onClick={() => setDownloaded(true)} style={{ gap: 8 }}>
                <Icon name="download" size={18} color="#fff" /> Download QR Code
              </button>
            </div>

            {downloaded && (
              <div style={{ marginTop: 16, background: 'rgba(34,197,94,0.1)', border: '1.5px solid rgba(34,197,94,0.3)', borderRadius: 12, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, fontWeight: 700, color: '#16a34a' }}>
                <span>✅</span> Your QR code has been downloaded! Check your Downloads folder.
              </div>
            )}
          </div>

          <div className="qr-preview-box">
            <p style={{ fontSize: 13, fontWeight: 800, color: '#8888aa', marginBottom: 16, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Live Preview</p>
            <div style={{ border: frame !== 'none' ? `3px solid ${qrColor}` : 'none', borderRadius: frame === 'rounded' ? 16 : frame !== 'none' ? 8 : 0, padding: frame !== 'none' ? 12 : 0, display: 'inline-block' }}>
              <QRCodeRenderer value={getQrValue()} color={qrColor} bgColor={bgColor} size={200} />
              {frame === 'badge' && <div style={{ background: qrColor, color: '#fff', fontSize: 11, fontWeight: 800, padding: '4px 12px', textAlign: 'center', borderRadius: '0 0 6px 6px', letterSpacing: '0.08em' }}>SCAN ME</div>}
              {frame === 'scan' && <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, marginTop: 6, color: qrColor, fontSize: 11, fontWeight: 800 }}>📲 SCAN TO VISIT</div>}
            </div>
            <div style={{ marginTop: 16, textAlign: 'left' }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: '#8888aa', marginBottom: 6 }}>Format:</div>
              <div style={{ display: 'flex', gap: 6 }}>
                {['PNG','SVG','PDF'].map(f => (
                  <div key={f} style={{ background: '#f0f0f8', borderRadius: 6, padding: '4px 10px', fontSize: 12, fontWeight: 800, color: '#6a6a8a', cursor: 'pointer' }}>{f}</div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

            <h3 style={{ fontSize: 16, fontWeight: 800 }}>Weekly Scans</h3>
            <span style={{ color: '#23CED9', fontSize: 13, fontWeight: 700, cursor: 'pointer' }} onClick={() => onGoTo('analytics')}>Analytics →</span>
          </div>
          <SimpleBarChart />
        </div>
      </div>

      {/* Quick create types */}
      <div style={{ marginTop: 20 }}>
        <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 16 }}>Quick Create</h3>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(100px, 1fr))', gap: 12 }}>
          {[
            { icon: '🔗', label: 'URL' },
            { icon: '📶', label: 'Wi-Fi' },
            { icon: '👤', label: 'vCard' },
            { icon: '📝', label: 'Text' },
            { icon: '📧', label: 'Email' },
            { icon: '📞', label: 'Phone' },
          ].map(t => (
            <div key={t.label} className="type-card" onClick={onCreateNew} style={{ padding: '16px 8px' }}>
              <div style={{ fontSize: 26, marginBottom: 6 }}>{t.icon}</div>
              <div style={{ fontSize: 12, fontWeight: 800 }}>{t.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ═══════════════════════════════════════════
// DASHBOARD SHELL
// ═══════════════════════════════════════════
const Dashboard = ({ onLogout }) => {
  const [view, setView] = useState('home');
  const [mobileNav, setMobileNav] = useState(false);

  const navItems = [
    { id: 'home', icon: 'home', label: 'Dashboard' },
    { id: 'create', icon: 'plus', label: 'Create QR' },
    { id: 'codes', icon: 'grid', label: 'My Codes' },
    { id: 'analytics', icon: 'bar', label: 'Analytics' },
    { id: 'settings', icon: 'settings', label: 'Settings' },
  ];

  const renderView = () => {
    switch(view) {
      case 'home': return <DashboardHome onCreateNew={() => setView('create')} onGoTo={setView} />;
      case 'create': return <QRCreator onBack={() => setView('home')} />;
      case 'codes': return <MyCodesView onCreateNew={() => setView('create')} />;
      case 'analytics': return <AnalyticsView />;
      case 'settings': return <SettingsView />;
      default: return null;
    }
  };

  return (
    <div className="dash-layout">
      <aside className="sidebar">
        <div className="sidebar-logo">✨ <span>QR</span>Magic</div>
        <div className="sidebar-nav">
          {navItems.map(item => (
            <div key={item.id} className={`sidebar-item ${view === item.id ? 'active' : ''}`} onClick={() => setView(item.id)}>
              <Icon name={item.icon} size={20} color={view === item.id ? '#fff' : 'rgba(255,255,255,0.65)'} />
              <span>{item.label}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 'auto' }}>
          <div style={{ padding: '12px 16px', borderRadius: 12, background: 'rgba(35,206,217,0.1)', marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Free Plan</div>
            <div style={{ height: 6, background: 'rgba(255,255,255,0.1)', borderRadius: 10, marginBottom: 6 }}>
              <div style={{ width: '30%', height: '100%', background: '#23CED9', borderRadius: 10 }} />
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', fontWeight: 600 }}>1 of 3 codes used</div>
          </div>
          <button style={{ width: '100%', background: 'linear-gradient(135deg, #23CED9, #FF69B4)', border: 'none', borderRadius: 12, padding: '11px', color: '#fff', fontFamily: 'Nunito', fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>
            ⚡ Upgrade
          </button>
          <div style={{ marginTop: 8, padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', borderRadius: 10, color: 'rgba(255,255,255,0.5)', fontWeight: 700, fontSize: 14 }} onClick={onLogout}>
            <span>🚪</span><span>Log Out</span>
          </div>
        </div>
      </aside>

      <main className="dash-main" style={{ minHeight: '100vh', paddingBottom: 48 }}>
        {renderView()}
      </main>
    </div>
  );
};

// ═══════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════
const App = () => {
  const [page, setPage] = useState('landing');
  const [authModal, setAuthModal] = useState(null);
  const [showWelcome, setShowWelcome] = useState(false);

  const handleAuth = () => {
    setAuthModal(null);
    setPage('dashboard');
    setTimeout(() => setShowWelcome(true), 600);
  };

  return (
    <div>
      {page === 'landing' && (
        <LandingPage
          onEnterApp={() => setPage('dashboard')}
          onLogin={() => setAuthModal('login')}
          onSignup={() => setAuthModal('signup')}
        />
      )}
      {page === 'dashboard' && (
        <Dashboard onLogout={() => setPage('landing')} />
      )}
      {authModal && (
        <AuthModal
          mode={authModal}
          onClose={() => setAuthModal(null)}
          onSuccess={handleAuth}
        />
      )}
      {showWelcome && (
        <WelcomeModal onClose={() => setShowWelcome(false)} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
