<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Magic – QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --blue: #23CED9; --pink: #FF69B4; --bg: #F9F9F9; --mint: #E0F7FA;
  --indigo: #1A1A2E; --blue-dark: #1ab5bf; --pink-dark: #e55ba0;
  --shadow: 0 8px 32px rgba(26,26,46,0.10); --shadow-lg: 0 16px 48px rgba(26,26,46,0.15);
  --radius: 20px; --radius-sm: 12px;
}
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--indigo); overflow-x: hidden; }
#root { min-height: 100vh; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes confetti { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(120px) rotate(720deg);opacity:0} }
@keyframes popIn { 0%{transform:scale(0.5);opacity:0} 80%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
@keyframes slideUp { from{transform:translateY(100%);opacity:0} to{transform:translateY(0);opacity:1} }
.animate-float { animation: float 3s ease-in-out infinite; }
.animate-pulse-btn { animation: pulse 2s ease-in-out infinite; }
.animate-fadeinup { animation: fadeInUp 0.6s ease both; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--mint); }
::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 8px; }
.btn-primary { background: var(--blue); color: #fff; border: none; border-radius: 50px; padding: 14px 32px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 20px rgba(35,206,217,0.4); transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary:hover { background: var(--blue-dark); transform: translateY(-2px) scale(1.04); box-shadow: 0 10px 28px rgba(35,206,217,0.5); }
.btn-primary:active { transform: scale(0.97); }
.btn-pink { background: var(--pink); color: #fff; border: none; border-radius: 50px; padding: 14px 32px; font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 6px 20px rgba(255,105,180,0.4); transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-pink:hover { background: var(--pink-dark); transform: translateY(-2px) scale(1.04); }
.btn-outline { background: transparent; color: var(--indigo); border: 2.5px solid var(--indigo); border-radius: 50px; padding: 12px 28px; font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.btn-outline:hover { background: var(--indigo); color: #fff; transform: translateY(-2px); }
.card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); border: 2px solid transparent; transition: all 0.25s; }
.card:hover { border-color: var(--blue); box-shadow: var(--shadow-lg); transform: translateY(-3px); }
.nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(249,249,249,0.92); backdrop-filter: blur(12px); border-bottom: 2px solid rgba(35,206,217,0.15); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-size: 26px; font-weight: 900; color: var(--indigo); display: flex; align-items: center; gap: 8px; cursor: pointer; }
.nav-logo span { color: var(--blue); }
.nav-links { display: flex; gap: 28px; align-items: center; }
.nav-link { font-weight: 700; color: var(--indigo); cursor: pointer; transition: color 0.2s; font-size: 15px; }
.nav-link:hover { color: var(--blue); }
.hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 120px 24px 80px; position: relative; overflow: hidden; background: radial-gradient(ellipse at 60% 0%, rgba(35,206,217,0.13) 0%, transparent 60%), radial-gradient(ellipse at 10% 80%, rgba(255,105,180,0.10) 0%, transparent 55%), var(--bg); }
.hero h1 { font-size: clamp(36px, 7vw, 72px); font-weight: 900; line-height: 1.1; color: var(--indigo); margin-bottom: 20px; }
.hero h1 .highlight { color: var(--blue); }
.hero h1 .highlight2 { color: var(--pink); }
.hero-sub { font-size: clamp(16px, 2.5vw, 21px); color: #5a5a7a; max-width: 580px; margin: 0 auto 36px; font-weight: 600; line-height: 1.6; }
.hero-blob1 { position: absolute; top: -60px; right: -80px; width: 350px; height: 350px; border-radius: 50%; background: rgba(35,206,217,0.12); filter: blur(40px); pointer-events: none; }
.hero-blob2 { position: absolute; bottom: -40px; left: -60px; width: 280px; height: 280px; border-radius: 50%; background: rgba(255,105,180,0.10); filter: blur(40px); pointer-events: none; }
.steps { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
@media (max-width: 700px) { .steps { grid-template-columns: 1fr; } }
.step-card { padding: 32px 24px; text-align: center; position: relative; }
.step-icon { width: 70px; height: 70px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto 16px; }
.step-num { position: absolute; top: 20px; left: 20px; width: 28px; height: 28px; background: var(--indigo); color: #fff; border-radius: 50%; font-size: 13px; font-weight: 900; display: flex; align-items: center; justify-content: center; }
.video-box { background: linear-gradient(135deg, var(--indigo) 0%, #2d2d5a 100%); border-radius: var(--radius); aspect-ratio: 16/9; max-width: 700px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--shadow-lg); }
.play-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--blue); display: flex; align-items: center; justify-content: center; margin-bottom: 16px; box-shadow: 0 0 0 16px rgba(35,206,217,0.2); animation: pulse 2s ease-in-out infinite; cursor: pointer; transition: transform 0.2s; }
.pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 1000px; margin: 0 auto; }
@media (max-width: 800px) { .pricing-grid { grid-template-columns: 1fr; max-width: 400px; } }
.plan-card { padding: 36px 28px; text-align: center; position: relative; }
.plan-card.featured { border-color: var(--blue); background: linear-gradient(160deg, #fff 0%, rgba(35,206,217,0.07) 100%); }
.plan-badge { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); background: var(--blue); color: #fff; border-radius: 50px; padding: 5px 18px; font-size: 13px; font-weight: 800; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.plan-price { font-size: 48px; font-weight: 900; color: var(--indigo); line-height: 1; }
.plan-price sup { font-size: 22px; vertical-align: super; }
.plan-price .period { font-size: 15px; color: #8888aa; font-weight: 600; }
.plan-feature { padding: 8px 0; font-size: 14px; font-weight: 600; color: #4a4a6a; display: flex; align-items: center; gap: 8px; text-align: left; }
.plan-divider { border: none; border-top: 1.5px solid rgba(35,206,217,0.2); margin: 20px 0; }
.toggle-bar { display: flex; align-items: center; gap: 12px; justify-content: center; margin-bottom: 40px; }
.toggle-switch { width: 56px; height: 30px; background: var(--blue); border-radius: 30px; position: relative; cursor: pointer; }
.toggle-knob { position: absolute; top: 4px; width: 22px; height: 22px; background: #fff; border-radius: 50%; transition: left 0.3s; box-shadow: 0 2px 8px rgba(0,0,0,0.18); }
.badge-save { background: var(--pink); color: #fff; border-radius: 50px; padding: 2px 10px; font-size: 12px; font-weight: 800; }
.section { padding: 80px 24px; }
.section-title { font-size: clamp(28px, 5vw, 44px); font-weight: 900; text-align: center; color: var(--indigo); margin-bottom: 12px; }
.section-sub { text-align: center; color: #7a7a9a; font-size: 17px; font-weight: 600; margin-bottom: 52px; }
.dash-layout { display: flex; min-height: 100vh; background: var(--bg); }
.sidebar { width: 240px; background: var(--indigo); min-height: 100vh; padding: 24px 16px; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; }
.sidebar-logo { font-size: 22px; font-weight: 900; color: #fff; margin-bottom: 36px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
.sidebar-logo span { color: var(--blue); }
.sidebar-nav { display: flex; flex-direction: column; gap: 4px; flex: 1; }
.sidebar-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: var(--radius-sm); cursor: pointer; color: rgba(255,255,255,0.65); font-weight: 700; font-size: 15px; transition: all 0.2s; }
.sidebar-item:hover { background: rgba(35,206,217,0.12); color: #fff; }
.sidebar-item.active { background: var(--blue); color: #fff; box-shadow: 0 4px 16px rgba(35,206,217,0.4); }
.dash-main { margin-left: 240px; flex: 1; padding: 32px; }
@media (max-width: 900px) { .sidebar { width: 64px; } .sidebar-logo, .sidebar-item span { display: none; } .dash-main { margin-left: 64px; } .sidebar-item { justify-content: center; } }
.wizard-steps { display: flex; gap: 0; margin-bottom: 36px; }
.wstep { display: flex; align-items: center; gap: 0; flex: 1; }
.wstep-circle { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 15px; flex-shrink: 0; border: 2.5px solid; transition: all 0.3s; }
.wstep-circle.done { background: var(--blue); border-color: var(--blue); color: #fff; }
.wstep-circle.active { background: #fff; border-color: var(--blue); color: var(--blue); }
.wstep-circle.inactive { background: #fff; border-color: #ddd; color: #bbb; }
.wstep-label { font-size: 13px; font-weight: 700; margin-left: 10px; }
.wstep-label.active { color: var(--blue); }
.wstep-label.inactive { color: #bbb; }
.wstep-line { flex: 1; height: 2.5px; margin: 0 8px; border-radius: 2px; transition: background 0.3s; }
.type-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 16px; }
.type-card { background: #fff; border: 2.5px solid transparent; border-radius: var(--radius-sm); padding: 20px 12px; text-align: center; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 16px rgba(26,26,46,0.07); }
.type-card:hover { border-color: var(--blue); transform: translateY(-3px); }
.type-card.selected { border-color: var(--blue); background: linear-gradient(135deg, rgba(35,206,217,0.08), rgba(35,206,217,0.02)); }
.type-icon { font-size: 34px; margin-bottom: 8px; }
.type-label { font-size: 13px; font-weight: 800; color: var(--indigo); }
.form-group { margin-bottom: 20px; }
.form-label { display: block; font-size: 14px; font-weight: 800; color: var(--indigo); margin-bottom: 8px; }
.form-input { width: 100%; padding: 12px 16px; border: 2.5px solid #e8e8f0; border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 15px; font-weight: 600; color: var(--indigo); background: #fff; transition: border-color 0.2s; outline: none; }
.form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(35,206,217,0.12); }
.color-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: all 0.2s; }
.color-dot.selected { border-color: var(--indigo); transform: scale(1.2); }
.qr-preview-box { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 32px; text-align: center; position: sticky; top: 20px; }
.ds-toggle { display: flex; background: #f0f0f8; border-radius: 50px; padding: 4px; gap: 4px; width: fit-content; }
.ds-option { padding: 8px 20px; border-radius: 50px; font-weight: 700; font-size: 14px; cursor: pointer; transition: all 0.2s; color: #8888aa; }
.ds-option.active { background: var(--blue); color: #fff; box-shadow: 0 4px 12px rgba(35,206,217,0.35); }
.stat-card { padding: 24px; text-align: center; }
.stat-num { font-size: 40px; font-weight: 900; color: var(--blue); line-height: 1; }
.stat-label { font-size: 14px; font-weight: 700; color: #7a7a9a; margin-top: 6px; }
.modal-overlay { position: fixed; inset: 0; background: rgba(26,26,46,0.55); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; animation: fadeIn 0.2s ease; }
.modal-box { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow-lg); padding: 40px; max-width: 440px; width: 100%; position: relative; animation: popIn 0.35s cubic-bezier(.34,1.56,.64,1) both; max-height: 90vh; overflow-y: auto; }
.modal-close { position: absolute; top: 16px; right: 16px; background: #f0f0f8; border: none; border-radius: 50%; width: 34px; height: 34px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: #8888aa; transition: all 0.2s; }
.modal-close:hover { background: var(--mint); color: var(--blue); }
.confetti-piece { position: absolute; width: 10px; height: 10px; border-radius: 2px; animation: confetti 2s ease forwards; }
.frame-opt { border: 2.5px solid transparent; border-radius: 10px; padding: 6px; cursor: pointer; font-size: 11px; font-weight: 700; text-align: center; transition: all 0.2s; color: #6a6a8a; }
.frame-opt:hover, .frame-opt.sel { border-color: var(--blue); color: var(--blue); background: rgba(35,206,217,0.07); }
.codes-table { width: 100%; border-collapse: collapse; }
.codes-table th { text-align: left; padding: 12px 16px; font-size: 13px; font-weight: 800; color: #8888aa; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #f0f0f8; }
.codes-table td { padding: 16px; font-size: 14px; font-weight: 600; border-bottom: 1.5px solid #f0f0f8; vertical-align: middle; }
.codes-table tr:last-child td { border-bottom: none; }
.codes-table tr:hover td { background: rgba(35,206,217,0.04); }
.code-thumb { width: 44px; height: 44px; border-radius: 8px; background: #f5f5fb; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.status-badge { border-radius: 50px; padding: 4px 12px; font-size: 12px; font-weight: 800; }
.badge-dynamic { background: rgba(35,206,217,0.15); color: var(--blue); }
.badge-static { background: rgba(255,105,180,0.15); color: var(--pink); }
.footer { background: var(--indigo); color: rgba(255,255,255,0.7); text-align: center; padding: 36px 24px; font-size: 14px; font-weight: 600; }
.footer a { color: var(--blue); text-decoration: none; cursor: pointer; }
.footer a:hover { text-decoration: underline; }
.legal-page { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
.legal-page h1 { font-size: 32px; font-weight: 900; margin-bottom: 8px; }
.legal-page h2 { font-size: 20px; font-weight: 800; margin: 32px 0 10px; color: var(--blue); }
.legal-page p, .legal-page li { font-size: 15px; line-height: 1.8; color: #4a4a6a; font-weight: 600; margin-bottom: 10px; }
.legal-page ul { padding-left: 24px; margin-bottom: 12px; }
.legal-date { font-size: 13px; color: #aaa; font-weight: 600; margin-bottom: 32px; }
.cookie-banner { position: fixed; bottom: 0; left: 0; right: 0; background: var(--indigo); color: #fff; padding: 16px 28px; z-index: 999; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; animation: slideUp 0.4s ease; box-shadow: 0 -4px 24px rgba(26,26,46,0.25); }
.cookie-banner p { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.85); flex: 1; min-width: 200px; }
.cookie-banner a { color: var(--blue); cursor: pointer; }
.upload-zone { border: 2.5px dashed #c8c8e0; border-radius: 14px; padding: 24px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fafafa; }
.upload-zone:hover { border-color: var(--blue); background: rgba(35,206,217,0.04); }
.upload-zone.has-logo { border-color: var(--blue); border-style: solid; background: rgba(35,206,217,0.06); }
.checkbox-row { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
.checkbox-row input[type=checkbox] { width: 18px; height: 18px; accent-color: var(--blue); cursor: pointer; flex-shrink: 0; margin-top: 2px; }
.checkbox-row span { font-size: 13px; font-weight: 600; color: #6a6a8a; line-height: 1.5; }
@media (max-width: 600px) { .nav { padding: 12px 16px; } .hero { padding: 100px 16px 60px; } .section { padding: 60px 16px; } }
</style>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── Simple localStorage user store ─────────────────────
const STORAGE_KEY = 'qrmagic_users';
const SESSION_KEY = 'qrmagic_session';

const getUsers = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } };
const saveUsers = u => localStorage.setItem(STORAGE_KEY, JSON.stringify(u));
const getSession = () => { try { return JSON.parse(sessionStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; } };
const saveSession = u => sessionStorage.setItem(SESSION_KEY, JSON.stringify(u));
const clearSession = () => sessionStorage.removeItem(SESSION_KEY);

const getUserData = (email) => {
  const users = getUsers();
  return users[email] || { email, codes: [], createdAt: new Date().toISOString(), deleted: false };
};
const saveUserData = (email, data) => {
  const users = getUsers();
  users[email] = data;
  saveUsers(users);
};

// ── Icons ──────────────────────────────────────────────
const Icon = ({ name, size = 20, color = 'currentColor' }) => {
  const icons = {
    home: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
    plus: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    grid: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>,
    bar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>,
    settings: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
    download: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,

    edit: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,

// ── QR Code Renderer ───────────────────────────────────
const QRCodeRenderer = ({ value, color, bgColor, size = 180, logoSrc = null, onRef }) => {
  const containerRef = useRef(null);
  const canvasRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current) return;
    containerRef.current.innerHTML = '';
    const val = value || 'https://qrmagic.io';
    try {
      const qr = new QRCode(containerRef.current, {
        text: val, width: size, height: size,
        colorDark: color || '#1A1A2E', colorLight: bgColor || '#FFFFFF',
        correctLevel: QRCode.CorrectLevel.H,
      });
      // After QR renders, overlay logo if provided
      if (logoSrc) {
        setTimeout(() => {
          const img = containerRef.current?.querySelector('img');
          const canvas = containerRef.current?.querySelector('canvas');
          const target = canvas || img;
          if (!target) return;
          const overlay = document.createElement('img');
          overlay.src = logoSrc;
          overlay.style.cssText = `position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:${Math.round(size*0.22)}px;height:${Math.round(size*0.22)}px;object-fit:contain;border-radius:6px;background:#fff;padding:3px;box-shadow:0 2px 8px rgba(0,0,0,0.15);`;
          containerRef.current.style.position = 'relative';
          containerRef.current.style.display = 'inline-block';
          containerRef.current.appendChild(overlay);
        }, 100);
      }
      if (onRef) onRef(containerRef.current);
    } catch(e) {}
  }, [value, color, bgColor, size, logoSrc]);

  return <div ref={containerRef} style={{ borderRadius: 8, display: 'inline-block' }} />;
};

// ── Download QR ────────────────────────────────────────
const downloadQR = (containerEl, format, filename) => {
  if (!containerEl) return;
  const canvas = containerEl.querySelector('canvas');
  const img = containerEl.querySelector('img:not([style*="absolute"])');

  if (format === 'PNG' || format === 'PDF') {
    let src = null;
    if (canvas) src = canvas.toDataURL('image/png');
    else if (img) src = img.src;
    if (!src) return;
    if (format === 'PNG') {
      const a = document.createElement('a');
      a.href = src; a.download = `${filename || 'qrmagic'}.png`; a.click();
    } else {
      // PDF via print-friendly approach
      const win = window.open('', '_blank');
      win.document.write(`<html><body style="margin:0;display:flex;align-items:center;justify-content:center;height:100vh;"><img src="${src}" style="max-width:400px;"/></body></html>`);
      win.document.close();
      setTimeout(() => { win.print(); win.close(); }, 500);
    }
  } else if (format === 'SVG') {
    // Generate SVG from canvas data
    let src = null;
    if (canvas) src = canvas.toDataURL('image/png');
    else if (img) src = img.src;
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="300" height="300"><image href="${src}" width="300" height="300"/></svg>`;
    const blob = new Blob([svgContent], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href = url; a.download = `${filename || 'qrmagic'}.svg`; a.click();
    URL.revokeObjectURL(url);
  }
};

const SimpleBarChart = ({ codes }) => {
  const days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const data = days.map((d, i) => {
    const base = codes.length * (3 + i * 2);
    return { name: d, scans: base + Math.floor(Math.random() * 20) };
  });
  const max = Math.max(...data.map(d => d.scans), 1);
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 10, height: 160, padding: '0 8px' }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 6 }}>
          <div style={{ width: '100%', borderRadius: '8px 8px 0 0', height: Math.max((d.scans / max) * 130, 4), background: 'linear-gradient(180deg, #23CED9, #1ab5bf)', boxShadow: '0 4px 12px rgba(35,206,217,0.3)', transition: 'height 0.5s ease' }} />
          <span style={{ fontSize: 11, fontWeight: 700, color: '#8888aa' }}>{d.name}</span>
        </div>
      ))}
    </div>
  );
};

const DonutChart = ({ data }) => {
  const total = data.reduce((s, d) => s + d.value, 0);
  let offset = 0;
  const r = 60, cx = 80, cy = 80, stroke = 28;
  const circumference = 2 * Math.PI * r;
  const segments = data.map(d => {
    const pct = d.value / (total || 1);
    const seg = { ...d, pct, offset, dashArray: `${pct * circumference} ${circumference}` };
    offset += pct; return seg;
  });
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 24, flexWrap: 'wrap' }}>
      <svg width={160} height={160} viewBox="0 0 160 160">
        {total === 0
          ? <circle cx={cx} cy={cy} r={r} fill="none" stroke="#f0f0f8" strokeWidth={stroke} />
          : segments.map((seg, i) => (
            <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={stroke}
              strokeDasharray={seg.dashArray} strokeDashoffset={-seg.offset * circumference}
              transform="rotate(-90 80 80)" />
          ))}
        <text x={cx} y={cy - 8} textAnchor="middle" fontSize="22" fontWeight="900" fill="#1A1A2E">{total}</text>
        <text x={cx} y={cy + 14} textAnchor="middle" fontSize="11" fontWeight="700" fill="#8888aa">total</text>
      </svg>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
        {data.map((d, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 12, height: 12, borderRadius: 3, background: d.color, flexShrink: 0 }} />
            <span style={{ fontSize: 13, fontWeight: 700, color: '#4a4a6a' }}>{d.label}</span>
            <span style={{ fontSize: 13, fontWeight: 800, color: '#1A1A2E', marginLeft: 'auto', paddingLeft: 12 }}>{d.value}%</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const AuthModal = ({ mode, onClose, onSuccess }) => {
  const [isLogin, setIsLogin] = useState(mode === 'login');
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [name, setName] = useState('');
  const [marketing, setMarketing] = useState(true);
  const [error, setError] = useState('');

  const handleSubmit = () => {
    if (!email || !pass) { setError('Please fill in all fields.'); return; }
    if (isLogin) {
      const users = getUsers();
      const u = users[email];
      if (!u) { setError('No account found with this email.'); return; }
      if (u.password !== pass) { setError('Incorrect password.'); return; }
      if (u.deleted) { setError('This account has been deleted. To reactivate, email office@honoshi.co.il'); return; }
      saveSession({ email, name: u.name });
      onSuccess({ email, name: u.name, isNew: false });
    } else {
      if (!name) { setError('Please enter your name.'); return; }
      const ud = getUserData(email);
      ud.name = name; ud.password = pass; ud.marketing = marketing; ud.codes = ud.codes || [];
      saveUserData(email, ud);
      saveSession({ email, name });
      onSuccess({ email, name, isNew: true });
    }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e => e.stopPropagation()}>
        <button className="modal-close" onClick={onClose}><Icon name="close" size={16} /></button>

          <p style={{ color: '#8888aa', fontWeight: 600, marginTop: 6, fontSize: 14 }}>{isLogin ? "We've missed you 💙" : 'Free forever. No credit card needed.'}</p>
        </div>
        {error && <div style={{ background: 'rgba(239,68,68,0.08)', border: '1.5px solid rgba(239,68,68,0.2)', borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 13, fontWeight: 700, color: '#dc2626' }}>{error}</div>}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {!isLogin && (
            <div className="form-group" style={{ marginBottom: 0 }}>
              <label className="form-label">Your Name</label>
              <input className="form-input" placeholder="Alex Smith" value={name} onChange={e => setName(e.target.value)} />
            </div>
          )}
          <div className="form-group" style={{ marginBottom: 0 }}>

          </div>
          {!isLogin && (
            <label className="checkbox-row" style={{ marginTop: 4 }}>
              <input type="checkbox" checked={marketing} onChange={e => setMarketing(e.target.checked)} />
              <span>I agree to receive product updates, tips, and promotional offers from QR Magic. You can unsubscribe at any time.</span>
            </label>
          )}
          {!isLogin && (
            <p style={{ fontSize: 12, color: '#aaa', fontWeight: 600, lineHeight: 1.5 }}>
              By signing up you agree to our <span style={{ color: '#23CED9', cursor: 'pointer' }}>Terms & Conditions</span> and <span style={{ color: '#23CED9', cursor: 'pointer' }}>Privacy Policy</span>.

const QRCreator = ({ onBack, userEmail, onCodeCreated }) => {
  const [step, setStep] = useState(1);
  const [qrType, setQrType] = useState(null);
  const [formData, setFormData] = useState({});
  const [qrColor, setQrColor] = useState('#1A1A2E');
  const [bgColor, setBgColor] = useState('#FFFFFF');
  const [isDynamic, setIsDynamic] = useState(true);
  const [frame, setFrame] = useState('none');
  const [logoSrc, setLogoSrc] = useState(null);
  const [downloadFormat, setDownloadFormat] = useState('PNG');
  const [downloaded, setDownloaded] = useState(false);
  const qrContainerRef = useRef(null);
  const logoInputRef = useRef(null);

  const types = [
    { id: 'url', icon: '🔗', label: 'URL' }, { id: 'image', icon: '🖼️', label: 'Image' },
    { id: 'wifi', icon: '📶', label: 'Wi-Fi' }, { id: 'vcard', icon: '👤', label: 'vCard' },
    { id: 'text', icon: '📝', label: 'Text' }, { id: 'email', icon: '📧', label: 'Email' },
    { id: 'sms', icon: '💬', label: 'SMS' }, { id: 'phone', icon: '📞', label: 'Phone' },
  ];
  const qrColors = ['#1A1A2E','#23CED9','#FF69B4','#7C3AED','#ef4444','#f97316','#22c55e','#000000'];
  const bgColors = ['#FFFFFF','#F9F9F9','#E0F7FA','#FFF3E0','#F3E8FF','#FFE4E6','#DCFCE7','#1A1A2E'];
  const frames = ['none','simple','rounded','badge','scan'];

  const getQrValue = () => {
    if (qrType === 'url') return formData.url || 'https://qrmagic.io';
    if (qrType === 'wifi') return `WIFI:T:WPA;S:${formData.ssid||''};P:${formData.password||''};;`;
    if (qrType === 'vcard') return `BEGIN:VCARD\nFN:${formData.name||''}\nTEL:${formData.phone||''}\nEMAIL:${formData.email||''}\nEND:VCARD`;
    if (qrType === 'text') return formData.text || 'Hello from QR Magic!';
    if (qrType === 'email') return `mailto:${formData.email||''}?subject=${formData.subject||''}`;
    if (qrType === 'phone') return `tel:${formData.phone||''}`;
    if (qrType === 'sms') return `sms:${formData.phone||''}?body=${formData.message||''}`;
    return 'https://qrmagic.io';
  };

  const handleLogoUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => setLogoSrc(ev.target.result);
    reader.readAsDataURL(file);
  };

  const handleDownload = () => {
    downloadQR(qrContainerRef.current, downloadFormat, formData.name || qrType || 'qrmagic');
    // Save code to user data
    if (userEmail) {
      const ud = getUserData(userEmail);
      const newCode = {
        id: Date.now(), name: formData.name || `${qrType?.toUpperCase()} Code`, type: qrType,
        status: isDynamic ? 'dynamic' : 'static', created: new Date().toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }),
        scans: 0, value: getQrValue(), color: qrColor, bgColor,
      };
      ud.codes = [newCode, ...(ud.codes || [])];
      saveUserData(userEmail, ud);
      if (onCodeCreated) onCodeCreated();
    }
    setDownloaded(true);
  };

  const renderForm = () => {
    const fd = formData;
    const set = (k, v) => setFormData({ ...fd, [k]: v });
    switch(qrType) {
      case 'url': return (
        <>
          <div style={{ marginBottom: 20 }}>
            <label className="form-label">QR Code Type</label>
            <div className="ds-toggle">
              <div className={`ds-option ${isDynamic ? 'active' : ''}`} onClick={() => setIsDynamic(true)}>⚡ Dynamic</div>
              <div className={`ds-option ${!isDynamic ? 'active' : ''}`} onClick={() => setIsDynamic(false)}>🔒 Static</div>
            </div>
            {isDynamic && <p style={{ fontSize: 12, color: '#8888aa', marginTop: 8, fontWeight: 600 }}>✓ Editable URL · ✓ Analytics · ✓ Scan tracking</p>}
          </div>
          <div className="form-group"><label className="form-label">Destination URL</label><input className="form-input" placeholder="https://yourwebsite.com" value={fd.url||''} onChange={e => set('url', e.target.value)} /></div>
          <div className="form-group"><label className="form-label">QR Code Name</label><input className="form-input" placeholder="My Homepage QR" value={fd.name||''} onChange={e => set('name', e.target.value)} /></div>
        </>
      );
      case 'wifi': return (<>
        <div className="form-group"><label className="form-label">Network Name (SSID)</label><input className="form-input" placeholder="MyHomeNetwork" value={fd.ssid||''} onChange={e => set('ssid', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Password</label><input className="form-input" type="password" placeholder="••••••••" value={fd.password||''} onChange={e => set('password', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Security</label><select className="form-input" value={fd.security||'WPA'} onChange={e => set('security', e.target.value)}><option>WPA</option><option>WEP</option><option>None</option></select></div>
      </>);
      case 'vcard': return (<>
        <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" placeholder="Alex Smith" value={fd.name||''} onChange={e => set('name', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Phone</label><input className="form-input" placeholder="+1 555 000 0000" value={fd.phone||''} onChange={e => set('phone', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" type="email" placeholder="alex@example.com" value={fd.email||''} onChange={e => set('email', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Company</label><input className="form-input" placeholder="Acme Inc." value={fd.company||''} onChange={e => set('company', e.target.value)} /></div>
      </>);
      case 'text': return (<div className="form-group"><label className="form-label">Your Text</label><textarea className="form-input" rows={5} placeholder="Type anything..." value={fd.text||''} onChange={e => set('text', e.target.value)} /></div>);
      case 'email': return (<>
        <div className="form-group"><label className="form-label">Email Address</label><input className="form-input" type="email" placeholder="recipient@example.com" value={fd.email||''} onChange={e => set('email', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Subject</label><input className="form-input" placeholder="Hello there!" value={fd.subject||''} onChange={e => set('subject', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Body</label><textarea className="form-input" rows={3} value={fd.body||''} onChange={e => set('body', e.target.value)} /></div>
      </>);
      case 'phone': return (<div className="form-group"><label className="form-label">Phone Number</label><input className="form-input" placeholder="+1 555 000 0000" value={fd.phone||''} onChange={e => set('phone', e.target.value)} /></div>);
      case 'sms': return (<>
        <div className="form-group"><label className="form-label">Phone Number</label><input className="form-input" placeholder="+1 555 000 0000" value={fd.phone||''} onChange={e => set('phone', e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Message</label><textarea className="form-input" rows={3} placeholder="Your pre-filled message..." value={fd.message||''} onChange={e => set('message', e.target.value)} /></div>
      </>);
      default: return (<div className="form-group"><label className="form-label">Value</label><input className="form-input" placeholder="Enter value..." value={fd.text||''} onChange={e => set('text', e.target.value)} /></div>);
    }
  };

  const steps = ['Select Type','Input Data','Customize'];
  const PreviewPanel = () => (
    <div className="qr-preview-box">
      <p style={{ fontSize: 13, fontWeight: 800, color: '#8888aa', marginBottom: 16, textTransform: 'uppercase', letterSpacing: '0.06em' }}>Live Preview</p>
      <div style={{ border: frame !== 'none' ? `3px solid ${qrColor}` : 'none', borderRadius: frame === 'rounded' ? 16 : frame !== 'none' ? 8 : 0, padding: frame !== 'none' ? 12 : 0, display: 'inline-block' }}>
        <QRCodeRenderer value={getQrValue()} color={qrColor} bgColor={bgColor} size={180} logoSrc={logoSrc} onRef={el => { qrContainerRef.current = el; }} />
        {frame === 'badge' && <div style={{ background: qrColor, color: '#fff', fontSize: 11, fontWeight: 800, padding: '4px 12px', textAlign: 'center', letterSpacing: '0.08em' }}>SCAN ME</div>}
        {frame === 'scan' && <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6, marginTop: 6, color: qrColor, fontSize: 11, fontWeight: 800 }}>📲 SCAN TO VISIT</div>}
      </div>
      <p style={{ fontSize: 12, color: '#aaaacc', marginTop: 12, fontWeight: 600 }}>Updates in real-time</p>
      {logoSrc && (
        <div style={{ marginTop: 12, display: 'flex', alignItems: 'center', gap: 8, justifyContent: 'center' }}>
          <img src={logoSrc} style={{ width: 28, height: 28, objectFit: 'contain', borderRadius: 6, border: '1px solid #e8e8f0' }} />
          <span style={{ fontSize: 12, fontWeight: 700, color: '#23CED9' }}>Logo applied ✓</span>
          <span style={{ fontSize: 12, color: '#aaa', cursor: 'pointer', fontWeight: 600 }} onClick={() => setLogoSrc(null)}>Remove</span>
        </div>
      )}
    </div>
  );

  return (
    <div>
      <button onClick={onBack} style={{ background: 'none', border: 'none', color: '#8888aa', cursor: 'pointer', fontFamily: 'Nunito', fontWeight: 700, fontSize: 14, display: 'flex', alignItems: 'center', gap: 6, marginBottom: 16 }}>← Back to Dashboard</button>
      <h1 style={{ fontSize: 28, fontWeight: 900, marginBottom: 4 }}>Create QR Code ✨</h1>
      <p style={{ color: '#8888aa', fontWeight: 600, marginBottom: 28 }}>Follow the steps below to create your perfect QR code</p>
      <div className="wizard-steps" style={{ marginBottom: 36 }}>
        {steps.map((s, i) => {
          const n = i + 1, state = n < step ? 'done' : n === step ? 'active' : 'inactive';
          return (
            <div key={i} className="wstep">
              <div className={`wstep-circle ${state}`}>{state === 'done' ? <Icon name="check" size={14} color="#fff" /> : n}</div>
              <span className={`wstep-label ${state === 'active' ? 'active' : 'inactive'}`}>{s}</span>
              {i < steps.length - 1 && <div className="wstep-line" style={{ background: n < step ? '#23CED9' : '#e8e8f0' }} />}
            </div>
          );
        })}
      </div>

      {step === 1 && (
        <div>
          <h3 style={{ fontSize: 18, fontWeight: 800, marginBottom: 16 }}>What type of QR code?</h3>
          <div className="type-grid">
            {types.map(t => (
              <div key={t.id} className={`type-card ${qrType === t.id ? 'selected' : ''}`} onClick={() => setQrType(t.id)}>
                <div className="type-icon">{t.icon}</div>
                <div className="type-label">{t.label}</div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 28, display: 'flex', justifyContent: 'flex-end' }}>
            <button className="btn-primary" onClick={() => qrType && setStep(2)} style={{ opacity: qrType ? 1 : 0.5 }}>Next Step →</button>
          </div>
        </div>
      )}

      {step === 2 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 28 }}>
          <div>
            <h3 style={{ fontSize: 18, fontWeight: 800, marginBottom: 20 }}>Enter your details</h3>
            {renderForm()}
            <div style={{ display: 'flex', gap: 12, marginTop: 8 }}>
              <button className="btn-outline" onClick={() => setStep(1)}>← Back</button>
              <button className="btn-primary" onClick={() => setStep(3)}>Next: Customize →</button>
            </div>
          </div>
          <PreviewPanel />
        </div>
      )}

      {step === 3 && (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 300px', gap: 28 }}>
          <div>
            <h3 style={{ fontSize: 18, fontWeight: 800, marginBottom: 20 }}>Customize your QR code</h3>
            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label">QR Code Color</label>
              <div className="color-row">{qrColors.map(c => <div key={c} className={`color-dot ${qrColor === c ? 'selected' : ''}`} style={{ background: c }} onClick={() => setQrColor(c)} />)}</div>
            </div>
            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label">Background Color</label>
              <div className="color-row">{bgColors.map(c => <div key={c} className={`color-dot ${bgColor === c ? 'selected' : ''}`} style={{ background: c, border: c === '#FFFFFF' ? '2px solid #e8e8f0' : 'none' }} onClick={() => setBgColor(c)} />)}</div>
            </div>
            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label" style={{ marginBottom: 12 }}>Frame Style</label>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
                {frames.map(f => (
                  <div key={f} className={`frame-opt ${frame === f ? 'sel' : ''}`} onClick={() => setFrame(f)}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>{f === 'none' ? '⊡' : f === 'simple' ? '□' : f === 'rounded' ? '▢' : f === 'badge' ? '🏷️' : '📲'}</div>
                    <div>{f}</div>
                  </div>
                ))}
              </div>
            </div>
            <div className="card" style={{ padding: 20, marginBottom: 16 }}>
              <label className="form-label">Add Logo (center)</label>
              <input ref={logoInputRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handleLogoUpload} />
              <div className={`upload-zone ${logoSrc ? 'has-logo' : ''}`} onClick={() => logoInputRef.current?.click()}
                onDragOver={e => { e.preventDefault(); e.currentTarget.style.borderColor = '#23CED9'; }}
                onDragLeave={e => { e.currentTarget.style.borderColor = ''; }}
                onDrop={e => { e.preventDefault(); const file = e.dataTransfer.files[0]; if (file) { const r = new FileReader(); r.onload = ev => setLogoSrc(ev.target.result); r.readAsDataURL(file); } }}>
                {logoSrc ? (
                  <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                    <img src={logoSrc} style={{ width: 48, height: 48, objectFit: 'contain', borderRadius: 8, border: '1px solid #e8e8f0' }} />
                    <div style={{ textAlign: 'left' }}>
                      <div style={{ fontSize: 14, fontWeight: 800, color: '#23CED9' }}>✓ Logo uploaded!</div>
                      <div style={{ fontSize: 12, color: '#8888aa', fontWeight: 600, marginTop: 2 }}>Click to change or drag a new file</div>
                    </div>
                  </div>
                ) : (
                  <>
                    <div style={{ fontSize: 28, marginBottom: 8 }}>📎</div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: '#8888aa' }}>Click to upload or drag & drop</div>
                    <div style={{ fontSize: 12, color: '#aaa', marginTop: 4, fontWeight: 600 }}>PNG, JPG, SVG supported</div>
                  </>
                )}
              </div>
            </div>
            <div className="card" style={{ padding: 20, marginBottom: 24 }}>
              <label className="form-label">Download Format</label>
              <div style={{ display: 'flex', gap: 10 }}>
                {['PNG','SVG','PDF'].map(f => (
                  <div key={f} onClick={() => setDownloadFormat(f)} style={{ flex: 1, border: `2.5px solid ${downloadFormat === f ? '#23CED9' : '#e8e8f0'}`, background: downloadFormat === f ? 'rgba(35,206,217,0.08)' : '#fff', borderRadius: 12, padding: '12px', textAlign: 'center', cursor: 'pointer', transition: 'all 0.2s' }}>
                    <div style={{ fontSize: 20, marginBottom: 4 }}>{f === 'PNG' ? '🖼️' : f === 'SVG' ? '✏️' : '📄'}</div>
                    <div style={{ fontSize: 13, fontWeight: 800, color: downloadFormat === f ? '#23CED9' : '#6a6a8a' }}>{f}</div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ display: 'flex', gap: 12 }}>
              <button className="btn-outline" onClick={() => setStep(2)}>← Back</button>
              <button className="btn-pink" onClick={handleDownload} style={{ gap: 8 }}>
                <Icon name="download" size={18} color="#fff" /> Download as {downloadFormat}
              </button>
            </div>
            {downloaded && (
              <div style={{ marginTop: 16, background: 'rgba(34,197,94,0.08)', border: '1.5px solid rgba(34,197,94,0.25)', borderRadius: 12, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10, fontSize: 14, fontWeight: 700, color: '#16a34a' }}>
                ✅ Downloaded as {downloadFormat}! QR code saved to your collection.
              </div>
            )}
          </div>
          <PreviewPanel />
        </div>
      )}
    </div>
  );
};

// MY CODES VIEW

const MyCodesView = ({ onCreateNew, userEmail }) => {
  const [codes, setCodes] = useState([]);
  const [search, setSearch] = useState('');
  useEffect(() => {
    const ud = getUserData(userEmail);
    setCodes(ud.codes || []);
  }, [userEmail]);

  const deleteCode = (id) => {
    const ud = getUserData(userEmail);
    ud.codes = ud.codes.filter(c => c.id !== id);
    saveUserData(userEmail, ud);
    setCodes(ud.codes);
  };

  const filtered = codes.filter(c => c.name?.toLowerCase().includes(search.toLowerCase()) || c.type?.toLowerCase().includes(search.toLowerCase()));

  return (
    <div>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28, flexWrap: 'wrap', gap: 12 }}>
        <div>
          <h1 style={{ fontSize: 28, fontWeight: 900, marginBottom: 4 }}>My QR Codes 🗂️</h1>
          <p style={{ color: '#8888aa', fontWeight: 600 }}>You have {codes.length} QR code{codes.length !== 1 ? 's' : ''}</p>
        </div>
        <button className="btn-primary" onClick={onCreateNew}><Icon name="plus" size={18} color="#fff" /> Create New</button>
      </div>
      {codes.length === 0 ? (
        <div className="card" style={{ padding: 60, textAlign: 'center' }}>
          <div style={{ fontSize: 60, marginBottom: 16 }}>🔳</div>
          <h3 style={{ fontSize: 20, fontWeight: 800, marginBottom: 8 }}>No QR codes yet</h3>
          <p style={{ color: '#8888aa', fontWeight: 600, marginBottom: 24 }}>Create your first QR code to see it here!</p>
          <button className="btn-primary" onClick={onCreateNew}><Icon name="plus" size={18} color="#fff" /> Create Your First QR Code</button>
        </div>
      ) : (
        <div className="card" style={{ padding: 0, overflow: 'hidden' }}>
          <div style={{ padding: '16px 20px', borderBottom: '2px solid #f0f0f8' }}>
            <input className="form-input" placeholder="🔍  Search codes..." style={{ maxWidth: 300 }} value={search} onChange={e => setSearch(e.target.value)} />
          </div>
          <table className="codes-table">
            <thead>
              <tr>
                <th>QR Code</th><th>Type</th><th>Status</th><th>Scans</th><th>Created</th><th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map((c) => (
                <tr key={c.id}>
                  <td>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                      <div className="code-thumb">{c.type === 'url' ? '🔗' : c.type === 'wifi' ? '📶' : c.type === 'vcard' ? '👤' : c.type === 'text' ? '📝' : c.type === 'email' ? '📧' : '🔳'}</div>
                      <div>
                        <div style={{ fontWeight: 800, fontSize: 14 }}>{c.name}</div>
                        <div style={{ fontSize: 12, color: '#8888aa', fontWeight: 600, maxWidth: 200, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{c.value}</div>
                      </div>
                    </div>
                  </td>
                  <td><span style={{ fontWeight: 700, color: '#6a6a8a', textTransform: 'capitalize' }}>{c.type}</span></td>
                  <td><span className={`status-badge ${c.status === 'dynamic' ? 'badge-dynamic' : 'badge-static'}`}>{c.status}</span></td>
                  <td><span style={{ fontWeight: 800 }}>{c.scans || 0}</span></td>
                  <td><span style={{ color: '#8888aa', fontWeight: 600 }}>{c.created}</span></td>
                  <td>
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button style={{ background: 'rgba(239,68,68,0.08)', border: 'none', borderRadius: 8, padding: '6px 8px', cursor: 'pointer' }} onClick={() => deleteCode(c.id)}><Icon name="trash" size={15} color="#ef4444" /></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

// SETTINGS VIEW
// ═══════════════════════════════════════════
const SettingsView = ({ userEmail, userName, onLogout }) => {
  const [showDeleteModal, setShowDeleteModal] = useState(false);
  const [name, setName] = useState(userName || '');
  const [saved, setSaved] = useState(false);

  const handleSave = () => {
    const ud = getUserData(userEmail);
    ud.name = name;
    saveUserData(userEmail, ud);
    setSaved(true);
    setTimeout(() => setSaved(false), 2500);
  };

  const handleDeleteConfirm = () => {
    const ud = getUserData(userEmail);
    ud.deleted = true;
    ud.deletedAt = new Date().toISOString();
    saveUserData(userEmail, ud);
    clearSession();
    setShowDeleteModal(false);
    onLogout();
  };

  return (
    <div>
      <h1 style={{ fontSize: 28, fontWeight: 900, marginBottom: 4 }}>Settings ⚙️</h1>
      <p style={{ color: '#8888aa', fontWeight: 600, marginBottom: 28 }}>Manage your account and preferences</p>
      <div className="card" style={{ padding: 28, marginBottom: 20 }}>
        <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 20 }}>Profile</h3>
        <div className="form-group"><label className="form-label">Full Name</label><input className="form-input" value={name} onChange={e => setName(e.target.value)} /></div>
        <div className="form-group"><label className="form-label">Email</label><input className="form-input" value={userEmail} disabled style={{ opacity: 0.6, cursor: 'not-allowed' }} /></div>
        <button className="btn-primary" style={{ fontSize: 14, padding: '10px 24px' }} onClick={handleSave}>
          {saved ? '✅ Saved!' : 'Save Changes'}
        </button>
      </div>
      <div className="card" style={{ padding: 28, marginBottom: 20 }}>
        <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 20 }}>Security</h3>
        <div className="form-group"><label className="form-label">Current Password</label><input className="form-input" type="password" placeholder="••••••••" /></div>
        <div className="form-group"><label className="form-label">New Password</label><input className="form-input" type="password" placeholder="••••••••" /></div>
        <button className="btn-primary" style={{ fontSize: 14, padding: '10px 24px' }}>Update Password</button>
      </div>
      <div className="card" style={{ padding: 28, border: '2px solid rgba(239,68,68,0.15)' }}>
        <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 8, color: '#ef4444' }}>Danger Zone</h3>
        <p style={{ color: '#8888aa', fontWeight: 600, fontSize: 14, marginBottom: 16 }}>Deleting your account will immediately revoke your access. Your data will be held for 60 days before permanent deletion.</p>
        <button style={{ background: 'rgba(239,68,68,0.08)', border: '1.5px solid rgba(239,68,68,0.3)', borderRadius: 50, padding: '10px 24px', color: '#ef4444', fontFamily: 'Nunito', fontWeight: 800, fontSize: 14, cursor: 'pointer' }} onClick={() => setShowDeleteModal(true)}>
          Delete Account
        </button>
      </div>
      {showDeleteModal && <DeleteAccountModal onClose={() => setShowDeleteModal(false)} onConfirm={handleDeleteConfirm} />}
    </div>
  );
};

// ═══════════════════════════════════════════
// DASHBOARD SHELL
// ═══════════════════════════════════════════
const Dashboard = ({ onLogout, userEmail, userName }) => {
  const [view, setView] = useState('home');
  const [codeCount, setCodeCount] = useState(0);

  useEffect(() => {
    const ud = getUserData(userEmail);
    setCodeCount((ud.codes || []).length);
  }, [userEmail, view]);

  const navItems = [
    { id: 'home', icon: 'home', label: 'Dashboard' },
    { id: 'create', icon: 'plus', label: 'Create QR' },
    { id: 'codes', icon: 'grid', label: 'My Codes' },
    { id: 'analytics', icon: 'bar', label: 'Analytics' },
    { id: 'settings', icon: 'settings', label: 'Settings' },
  ];

  const handleCodeCreated = () => {
    const ud = getUserData(userEmail);
    setCodeCount((ud.codes || []).length);
  };

  const renderView = () => {
    switch(view) {
      case 'home': return <DashboardHome onCreateNew={() => setView('create')} onGoTo={setView} userEmail={userEmail} userName={userName} />;
      case 'create': return <QRCreator onBack={() => setView('home')} userEmail={userEmail} onCodeCreated={handleCodeCreated} />;
      case 'codes': return <MyCodesView onCreateNew={() => setView('create')} userEmail={userEmail} />;
      case 'analytics': return <AnalyticsView userEmail={userEmail} />;
      case 'settings': return <SettingsView userEmail={userEmail} userName={userName} onLogout={onLogout} />;
      default: return null;
    }
  };

  const usedPct = Math.min((codeCount / 3) * 100, 100);

  return (
    <div className="dash-layout">
      <aside className="sidebar">
        <div className="sidebar-logo">✨ <span>QR</span> Magic</div>
        <div className="sidebar-nav">
          {navItems.map(item => (
            <div key={item.id} className={`sidebar-item ${view === item.id ? 'active' : ''}`} onClick={() => setView(item.id)}>
              <Icon name={item.icon} size={20} color={view === item.id ? '#fff' : 'rgba(255,255,255,0.65)'} />
              <span>{item.label}</span>
            </div>
          ))}
        </div>
        <div style={{ marginTop: 'auto' }}>
          <div style={{ padding: '12px 16px', borderRadius: 12, background: 'rgba(35,206,217,0.1)', marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Free Plan</div>
            <div style={{ height: 6, background: 'rgba(255,255,255,0.1)', borderRadius: 10, marginBottom: 6 }}>
              <div style={{ width: `${usedPct}%`, height: '100%', background: '#23CED9', borderRadius: 10, transition: 'width 0.5s ease' }} />
            </div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', fontWeight: 600 }}>{codeCount} of 3 codes used</div>
          </div>
          <button style={{ width: '100%', background: 'linear-gradient(135deg, #23CED9, #FF69B4)', border: 'none', borderRadius: 12, padding: '11px', color: '#fff', fontFamily: 'Nunito', fontWeight: 800, fontSize: 14, cursor: 'pointer' }}>⚡ Upgrade</button>
          <div style={{ marginTop: 8, padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', borderRadius: 10, color: 'rgba(255,255,255,0.5)', fontWeight: 700, fontSize: 14 }} onClick={onLogout}>
            <span>🚪</span><span>Log Out</span>
          </div>
        </div>
      </aside>
      <main className="dash-main" style={{ minHeight: '100vh', paddingBottom: 48 }}>{renderView()}</main>
    </div>
  );
};

// ═══════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════
const App = () => {
  const [page, setPage] = useState('landing');
  const [legalPage, setLegalPage] = useState(null);
  const [authModal, setAuthModal] = useState(null);
  const [showWelcome, setShowWelcome] = useState(false);
  const [cookieAccepted, setCookieAccepted] = useState(() => !!localStorage.getItem('qrmagic_cookies'));
  const [currentUser, setCurrentUser] = useState(() => getSession());

  useEffect(() => { if (currentUser) setPage('dashboard'); }, []);

  const handleAuth = (user) => {
    setCurrentUser(user);
    setAuthModal(null);
    setPage('dashboard');
    if (user.isNew) setTimeout(() => setShowWelcome(true), 600);
  };

  const handleLogout = () => {
    clearSession();
    setCurrentUser(null);
    setPage('landing');
  };

  const handleCookieAccept = () => {
    localStorage.setItem('qrmagic_cookies', '1');
    setCookieAccepted(true);
  };

  if (legalPage) return <LegalPage type={legalPage} onBack={() => setLegalPage(null)} />;

  return (
    <div>
      {page === 'landing' && (
        <LandingPage onEnterApp={() => setAuthModal('signup')} onLogin={() => setAuthModal('login')} onSignup={() => setAuthModal('signup')} onLegal={setLegalPage} />
      )}
      {page === 'dashboard' && currentUser && (
        <Dashboard onLogout={handleLogout} userEmail={currentUser.email} userName={currentUser.name} />
      )}
      {authModal && (
        <AuthModal mode={authModal} onClose={() => setAuthModal(null)} onSuccess={handleAuth} />
      )}
      {showWelcome && (
        <WelcomeModal onClose={() => setShowWelcome(false)} userName={currentUser?.name} />
      )}
      {!cookieAccepted && page === 'landing' && (
        <CookieBanner onAccept={handleCookieAccept} onOpenPolicy={() => setLegalPage('cookies')} />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
